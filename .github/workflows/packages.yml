name: Linux Packages

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation toolchain (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Install cargo-deb and cargo-generate-rpm
        run: cargo install cargo-deb cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary to expected location (cargo-deb/rpm need target/release/)
        run: |
          mkdir -p target/release
          cp target/${{ matrix.target }}/release/rustgram target/release/rustgram

      - name: Build .deb
        run: cargo deb --no-build --target ${{ matrix.target }}

      - name: Build .rpm
        run: cargo generate-rpm

      - name: Collect packages
        id: packages
        shell: bash
        run: |
          DEB=$(ls target/${{ matrix.target }}/debian/*.deb 2>/dev/null || ls target/debian/*.deb)
          RPM=$(ls target/generate-rpm/*.rpm)
          echo "deb=$DEB" >> "$GITHUB_OUTPUT"
          echo "rpm=$RPM" >> "$GITHUB_OUTPUT"

      - name: Upload packages to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ steps.packages.outputs.deb }}" \
            "${{ steps.packages.outputs.rpm }}" \
            --clobber
